<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Multimedia NoSQL</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 md:p-8">
    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <div class="bg-white p-6 rounded-lg shadow-md h-fit md:col-span-1">
            <h2 class="text-xl font-bold mb-4 text-gray-800">Subir Elemento a NoSQL</h2>
            <form id="formMultimedia" enctype="multipart/form-data" class="space-y-4">
                <div>
                    <label class="block font-medium text-sm text-gray-700">Título del Elemento:</label>
                    <input type="text" id="titulo" name="titulo" required class="w-full border p-2 rounded text-sm mt-1 focus:outline-blue-500">
                </div>
                <div>
                    <label class="block font-medium text-sm text-gray-700">Descripción:</label>
                    <textarea id="descripcion" name="descripcion" class="w-full border p-2 rounded text-sm mt-1 focus:outline-blue-500" rows="3"></textarea>
                </div>
                <div>
                    <label class="block font-medium text-sm text-gray-700">Etiquetas / Tags (Separadas por comas):</label>
                    <input type="text" id="tags" name="tags" placeholder="ej. música, paisaje, arte" class="w-full border p-2 rounded text-sm mt-1 focus:outline-blue-500">
                </div>
                <div>
                    <label class="block font-medium text-sm text-gray-700">Seleccionar Imagen (PNG/JPG):</label>
                    <input type="file" id="imagen" name="imagen" accept="image/*" required class="w-full text-sm mt-1">
                </div>
                <div>
                    <label class="block font-medium text-sm text-gray-700">Seleccionar Audio (MP3/WAV):</label>
                    <input type="file" id="audio" name="audio" accept="audio/*" required class="w-full text-sm mt-1">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white px-4 py-2 rounded font-semibold hover:bg-blue-700 transition duration-200">
                    Guardar en la Nube
                </button>
            </form>
        </div>

        <div class="md:col-span-2">
            <h2 class="text-2xl font-bold mb-4 text-gray-800">Galería Multimedia Interactiva</h2>
            <div id="galeria" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                </div>
        </div>
    </div>

    <div id="modalEditar" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-lg shadow-lg max-w-md w-full">
            <h3 class="text-xl font-bold mb-4 text-gray-800">Editar Registro NoSQL</h3>
            <form id="formEditar" class="space-y-4">
                <input type="hidden" id="editId">
                <div>
                    <label class="block font-medium text-sm text-gray-700">Nuevo Título:</label>
                    <input type="text" id="editTitulo" required class="w-full border p-2 rounded text-sm mt-1 focus:outline-blue-500">
                </div>
                <div>
                    <label class="block font-medium text-sm text-gray-700">Nueva Descripción:</label>
                    <textarea id="editDescripcion" class="w-full border p-2 rounded text-sm mt-1 focus:outline-blue-500" rows="3"></textarea>
                </div>
                <div>
                    <label class="block font-medium text-sm text-gray-700">Nuevas Etiquetas (Separadas por comas):</label>
                    <input type="text" id="editTags" class="w-full border p-2 rounded text-sm mt-1 focus:outline-blue-500">
                </div>
                <div class="flex justify-end space-x-2 pt-2">
                    <button type="button" onclick="cerrarModal()" class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-4 py-2 rounded text-sm transition">
                        Cancelar
                    </button>
                    <button type="submit" class="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded text-sm font-semibold transition">
                        Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://multimedia-backend-p6xb.onrender.com/api/multimedia';
        const form = document.getElementById('formMultimedia');
        const galeria = document.getElementById('galeria');
        
        // Variables de la ventana modal
        const modalEditar = document.getElementById('modalEditar');
        const formEditar = document.getElementById('formEditar');
        const editId = document.getElementById('editId');
        const editTitulo = document.getElementById('editTitulo');
        const editDescripcion = document.getElementById('editDescripcion');
        const editTags = document.getElementById('editTags');

        // 1. READ: Obtener y listar la galería (Blindado contra datos antiguos/nulos)
        async function cargarGaleria() {
            try {
                const res = await fetch(API_URL);
                const datos = await res.json();
                galeria.innerHTML = '';

                datos.forEach(item => {
                    const tarjeta = document.createElement('div');
                    tarjeta.className = "bg-white p-4 rounded-lg shadow-md border flex flex-col justify-between";
                    
                    // VALIDACIÓN DE SEGURIDAD: Si no existen tags en registros viejos, crea un arreglo vacío
                    const itemTags = item.tags || [];
                    const tagsTexto = itemTags.join(', ');

                    // Solución definitiva para que caracteres extraños o comillas no rompan el HTML
                    const tituloEscapado = encodeURIComponent(item.titulo || '');
                    const descEscapada = encodeURIComponent(item.descripcion || '');
                    const tagsEscapados = encodeURIComponent(tagsTexto);

                    // Forzar HTTPS en los links viejos que vengan desde la base de datos para evitar el Mixed Content
                    const imgUrlSegura = (item.imagenUrl || '').replace('http://', 'https://');
                    const audUrlSegura = (item.audioUrl || '').replace('http://', 'https://');

                    tarjeta.innerHTML = `
                        <div>
                            <img src="${imgUrlSegura}" alt="Multimedia" class="w-full h-40 object-cover rounded-md mb-2">
                            <h3 class="font-bold text-lg text-gray-900">${item.titulo || 'Sin Título'}</h3>
                            <p class="text-gray-600 text-sm my-1">${item.descripcion || 'Sin descripción'}</p>
                            
                            <div class="flex flex-wrap gap-1 my-2">
                                ${itemTags.map(t => `<span class="bg-gray-200 text-gray-700 text-xs px-2 py-0.5 rounded-full">#${t}</span>`).join('')}
                            </div>
                            
                            <audio controls src="${audUrlSegura}" class="w-full mt-3"></audio>
                        </div>
                        <div class="mt-4 pt-2 border-t flex justify-end space-x-2">
                            <button onclick="prepararEdicion('${item._id}', '${tituloEscapado}', '${descEscapada}', '${tagsEscapados}')" class="bg-amber-500 hover:bg-amber-600 text-white text-xs px-3 py-1 rounded transition shadow-sm font-medium">
                                Editar
                            </button>
                            <button onclick="eliminarElemento('${item._id}')" class="bg-red-500 hover:bg-red-600 text-white text-xs px-3 py-1 rounded transition shadow-sm font-medium">
                                Eliminar
                            </button>
                        </div>
                    `;
                    galeria.appendChild(tarjeta);
                });
            } catch (error) {
                console.error("Error al cargar la galería:", error);
            }
        }

        // Función intermedia que decodifica los textos de forma segura para el Modal
        function prepararEdicion(id, tit, desc, tgs) {
            abrirModal(id, decodeURIComponent(tit), decodeURIComponent(desc), decodeURIComponent(tgs));
        }

        // 2. CREATE: Enviar un nuevo elemento multimedia
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            try {
                const res = await fetch(API_URL, { method: 'POST', body: formData });
                if(res.ok) {
                    alert('¡Elemento guardado con éxito!');
                    form.reset();
                    cargarGaleria();
                } else {
                    alert('Error en el servidor al intentar guardar.');
                }
            } catch (error) {
                console.error("Error de red:", error);
            }
        });

        // 3. UPDATE: Funciones lógicas para abrir, cerrar y procesar la edición
        function abrirModal(id, titulo, descripcion, tags) {
            editId.value = id;
            editTitulo.value = titulo;
            editDescripcion.value = descripcion;
            editTags.value = tags;
            modalEditar.classList.remove('hidden'); 
        }

        function cerrarModal() {
            modalEditar.classList.add('hidden'); 
        }

        formEditar.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = editId.value;

            const datosActualizados = {
                titulo: editTitulo.value,
                descripcion: editDescripcion.value,
                tags: editTags.value
            };

            try {
                const res = await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datosActualizados)
                });

                if (res.ok) {
                    alert('¡Registro multimedia actualizado con éxito!');
                    cerrarModal();
                    cargarGaleria(); 
                } else {
                    alert('Error al intentar actualizar en el servidor.');
                }
            } catch (error) {
                console.error("Error al conectar con la API de edición:", error);
            }
        });

        // 4. DELETE: Eliminar un registro de la base de datos NoSQL
        async function eliminarElemento(id) {
            if(confirm('¿Estás seguro de que deseas eliminar este registro multimedia?')) {
                try {
                    const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                    if(res.ok) cargarGaleria();
                } catch (error) {
                    console.error("Error al eliminar:", error);
                }
            }
        }

        // Inicializar la carga de manera segura cuando el HTML esté completamente cargado
        document.addEventListener('DOMContentLoaded', () => {
        console.log("¡DOM completamente cargado! Iniciando petición a Render...");
        cargarGaleria();
});
    </script>
</body>
</html>
